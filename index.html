<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ハルヤスミン - 春休み育成ゲーム</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --pink: #ff6b9d; --orange: #ffa552; --yellow: #ffe066; --green: #7ed957; --blue: #5cc9f5; --purple: #b388ff; --bg: #fff8f0; --card: #ffffff; }
  body { font-family: 'M PLUS Rounded 1c', sans-serif; background: var(--bg); min-height: 100vh; overflow-x: hidden; }
  .header { background: linear-gradient(135deg, var(--pink), var(--orange), var(--yellow)); padding: 12px 20px; text-align: center; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); position: relative; z-index: 10; }
  .header h1 { font-size: 28px; font-weight: 900; letter-spacing: 4px; }
  .header .subtitle { font-size: 13px; opacity: 0.9; }
  .calendar-bar { max-width: 1100px; margin: 0 auto; padding: 12px 16px 0; }
  .calendar-card { background: var(--card); border-radius: 16px; padding: 12px 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .calendar-title { font-size: 13px; font-weight: 700; color: #666; }
  .calendar-today { font-size: 12px; font-weight: 700; color: var(--pink); }
  .calendar-days { display: flex; gap: 3px; align-items: flex-end; }
  .cal-day { flex: 1; text-align: center; position: relative; }
  .cal-day-num { font-size: 10px; font-weight: 700; color: #bbb; margin-bottom: 3px; line-height: 1; }
  .cal-day-bar { height: 22px; border-radius: 4px; background: #f0e6dd; position: relative; overflow: hidden; }
  .cal-day.past .cal-day-bar { background: linear-gradient(180deg, var(--green), #5cb849); }
  .cal-day.past .cal-day-num { color: var(--green); }
  .cal-day.today .cal-day-bar { background: linear-gradient(180deg, var(--orange), var(--pink)); box-shadow: 0 0 8px rgba(255,107,157,0.5); }
  .cal-day.today .cal-day-num { color: var(--pink); font-size: 11px; }
  .cal-day.today .cal-day-bar::after { content: '🌟'; position: absolute; top: -14px; left: 50%; transform: translateX(-50%); font-size: 14px; animation: starPulse 1.5s ease-in-out infinite; }
  @keyframes starPulse { 0%,100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.3); } }
  .cal-day.future .cal-day-bar { background: #f0e6dd; }
  .cal-day.future .cal-day-num { color: #ddd; }
  .cal-day-dow { font-size: 8px; color: #ccc; margin-top: 2px; line-height: 1; }
  .cal-day.today .cal-day-dow { color: var(--pink); font-weight: 700; }
  .cal-day.past .cal-day-dow { color: #aaa; }
  .cal-day.is-sat .cal-day-num { color: var(--blue) !important; }
  .cal-day.is-sun .cal-day-num { color: var(--pink) !important; }
  .cal-day.is-sat .cal-day-dow { color: var(--blue); }
  .cal-day.is-sun .cal-day-dow { color: var(--pink); }
  .cal-day.future.is-sat .cal-day-num { color: #a0d8f0 !important; }
  .cal-day.future.is-sun .cal-day-num { color: #f0a0b8 !important; }
  .cal-remaining { text-align: center; margin-top: 6px; font-size: 11px; font-weight: 700; color: #aaa; }
  .cal-remaining span { color: var(--orange); }
  .main { display: flex; flex-direction: row; max-width: 1100px; margin: 0 auto; gap: 16px; padding: 16px; min-height: calc(100vh - 130px); }
  @media (max-width: 750px) { .main { flex-direction: column; } .task-area, .game-area { width: 100% !important; } .game-area { min-height: 420px; } }
  .task-area { width: 340px; flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; }
  .task-section { background: var(--card); border-radius: 16px; padding: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .task-section h2 { font-size: 15px; font-weight: 700; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px dashed #ffe0cc; display: flex; align-items: center; gap: 6px; }
  .task-item { display: flex; align-items: center; gap: 8px; padding: 8px 6px; border-radius: 10px; transition: background 0.2s; }
  .task-item:hover { background: #fff5ee; }
  .task-icon { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
  .task-info { flex: 1; min-width: 0; }
  .task-name { font-size: 13px; font-weight: 700; color: #444; }
  .task-progress { font-size: 11px; color: #999; margin-top: 1px; }
  .task-btn { padding: 6px 14px; border: none; border-radius: 20px; font-family: inherit; font-size: 12px; font-weight: 700; color: white; cursor: pointer; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; }
  .task-btn:hover { transform: scale(1.08); filter: brightness(1.1); }
  .task-btn:active { transform: scale(0.95); }
  .task-btn.done { background: #ccc !important; cursor: default; transform: none !important; filter: none !important; }
  .task-btn.bg-pink { background: var(--pink); }
  .task-btn.bg-orange { background: var(--orange); }
  .task-btn.bg-green { background: var(--green); }
  .task-btn.bg-blue { background: var(--blue); }
  .task-btn.bg-purple { background: var(--purple); }
  .game-area { flex: 1; display: flex; flex-direction: column; gap: 12px; }
  .status-bar { background: var(--card); border-radius: 16px; padding: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .status-row { display: flex; align-items: center; gap: 10px; }
  .stage-label { font-size: 13px; font-weight: 700; color: var(--pink); white-space: nowrap; }
  .xp-bar-bg { flex: 1; height: 18px; background: #f0e6dd; border-radius: 10px; overflow: hidden; position: relative; }
  .xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--yellow), var(--orange), var(--pink)); border-radius: 10px; transition: width 0.6s ease; position: relative; }
  .xp-bar-fill::after { content: ''; position: absolute; top: 3px; left: 6px; right: 6px; height: 5px; background: rgba(255,255,255,0.4); border-radius: 3px; }
  .xp-text { font-size: 12px; font-weight: 700; color: #888; white-space: nowrap; }
  .room { flex: 1; background: var(--card); border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); position: relative; overflow: hidden; min-height: 360px; }
  .room-bg { position: absolute; inset: 0; background: linear-gradient(180deg, #e8f6ff 0%, #d4f0e0 60%, #c8e6b8 100%); }
  .cloud { position: absolute; background: white; border-radius: 50%; opacity: 0.7; animation: cloudFloat linear infinite; }
  @keyframes cloudFloat { 0% { transform: translateX(-80px); } 100% { transform: translateX(calc(100vw + 80px)); } }
  .floor { position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(180deg, #8bc34a, #689f38); border-radius: 0 0 16px 16px; }
  .floor::before { content: ''; position: absolute; top: -10px; left: 0; right: 0; height: 20px; background: radial-gradient(ellipse at 50% 100%, #8bc34a 0%, transparent 70%); }
  .character { position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%); transition: left 0.5s ease, bottom 0.3s ease; z-index: 5; cursor: pointer; }
  .char-body { position: relative; display: flex; flex-direction: column; align-items: center; }
  .char-sprite { font-size: 64px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15)); transition: font-size 0.5s ease, transform 0.3s; }
  @keyframes idleBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .char-sprite.idle { animation: idleBounce 2s ease-in-out infinite; }
  @keyframes eatAnim { 0% { transform: scale(1); } 25% { transform: scale(1.2) rotate(-10deg); } 50% { transform: scale(0.9) rotate(10deg); } 75% { transform: scale(1.15) rotate(-5deg); } 100% { transform: scale(1); } }
  .char-sprite.eating { animation: eatAnim 0.6s ease; }
  .dropped-item { position: absolute; font-size: 32px; cursor: pointer; z-index: 4; transition: transform 0.2s; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2)); }
  .dropped-item:hover { transform: scale(1.3); }
  .dropped-item.bounce-hint { animation: bounceHint 0.6s ease infinite; }
  @keyframes bounceHint { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.15); } }
  @keyframes itemFall { 0% { top: -40px; opacity: 0; } 10% { opacity: 1; } 70% { top: var(--land-y); } 85% { top: calc(var(--land-y) - 15px); } 100% { top: var(--land-y); } }
  @keyframes flyToChar { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.8; } 100% { transform: scale(0); opacity: 0; } }
  .speech-bubble { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: white; border: 2px solid var(--pink); border-radius: 16px; padding: 6px 14px; font-size: 13px; font-weight: 700; color: #444; white-space: nowrap; z-index: 10; animation: bubblePop 0.3s ease; pointer-events: none; }
  .speech-bubble::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 8px solid transparent; border-top-color: var(--pink); }
  @keyframes bubblePop { 0% { transform: translateX(-50%) scale(0); } 60% { transform: translateX(-50%) scale(1.2); } 100% { transform: translateX(-50%) scale(1); } }
  .evo-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: center; justify-content: center; flex-direction: column; }
  .evo-overlay.show { display: flex; }
  .evo-content { text-align: center; color: white; animation: evoAppear 1s ease; }
  @keyframes evoAppear { 0% { transform: scale(0.3); opacity: 0; } 60% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
  .evo-emoji { font-size: 120px; margin-bottom: 20px; }
  .evo-title { font-size: 32px; font-weight: 900; text-shadow: 0 0 20px var(--yellow); }
  .evo-sub { font-size: 16px; margin-top: 10px; opacity: 0.8; }
  .evo-close { margin-top: 30px; padding: 12px 40px; border: none; border-radius: 30px; background: var(--pink); color: white; font-family: inherit; font-size: 16px; font-weight: 700; cursor: pointer; }
  .confetti-piece { position: fixed; z-index: 101; font-size: 24px; pointer-events: none; }
  .reset-btn { position: fixed; bottom: 10px; right: 10px; background: #ddd; border: none; padding: 4px 10px; border-radius: 8px; font-size: 10px; color: #999; cursor: pointer; font-family: inherit; z-index: 50; }
</style>
</head>
<body>
<div class="header"><h1>🌸 ハルヤスミン 🌸</h1><div class="subtitle">はるやすみ いくせいゲーム</div></div>
<div class="calendar-bar"><div class="calendar-card"><div class="calendar-header"><div class="calendar-title">🗓 はるやすみカレンダー</div><div class="calendar-today" id="calendar-today"></div></div><div class="calendar-days" id="calendar-days"></div><div class="cal-remaining" id="cal-remaining"></div></div></div>
<div class="main">
  <div class="task-area">
    <div class="task-section"><h2>📅 きょうのタスク</h2><div id="daily-tasks"></div></div>
    <div class="task-section"><h2>📚 しゅくだい（ぜんぶ）</h2><div id="homework-tasks"></div></div>
  </div>
  <div class="game-area">
    <div class="status-bar"><div class="status-row"><span class="stage-label" id="stage-label">🥚 たまご</span><div class="xp-bar-bg"><div class="xp-bar-fill" id="xp-bar" style="width:0%"></div></div><span class="xp-text" id="xp-text">0 / 5</span></div></div>
    <div class="room" id="room">
      <div class="room-bg"></div>
      <div class="cloud" style="width:60px;height:24px;top:20px;left:10%;animation-duration:25s;"></div>
      <div class="cloud" style="width:80px;height:30px;top:45px;left:50%;animation-duration:35s;animation-delay:-10s;"></div>
      <div class="cloud" style="width:50px;height:20px;top:30px;left:75%;animation-duration:30s;animation-delay:-5s;"></div>
      <div class="floor"></div>
      <div class="character" id="character">
        <div class="char-body">
          <div class="char-sprite idle" id="char-sprite">🥚</div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="evo-overlay" id="evo-overlay"><div class="evo-content"><div class="evo-emoji" id="evo-emoji">🐣</div><div class="evo-title" id="evo-title">しんかした！</div><div class="evo-sub" id="evo-sub"></div><button class="evo-close" onclick="closeEvolution()">やったー！</button></div></div>
<button class="reset-btn" onclick="if(confirm('データをリセットしますか？')){localStorage.removeItem('haruyasmin');location.reload();}">リセット</button>

const TASKS = [
  { id:'ondoku', name:'おんどく', icon:'🍎', item:'🍎', color:'bg-pink', type:'daily', goal:null },
  { id:'keisan', name:'けいさんカード', icon:'🍊', item:'🍊', color:'bg-orange', type:'daily', goal:null },
  { id:'otetsudai', name:'おてつだい', icon:'💎', item:'💎', color:'bg-blue', type:'daily', goal:null },
  { id:'nawatobi', name:'なわとび', icon:'🪢', item:'🪢', color:'bg-green', type:'daily', goal:null },
  { id:'smile', name:'スマイルカレンダー', icon:'😊', item:'😊', color:'bg-purple', type:'daily', goal:null },
  { id:'ninen', name:'2ねんせいへGO', icon:'🍙', item:'🍙', color:'bg-pink', type:'homework', goal:19 },
  { id:'kanji', name:'かんじれんしゅう', icon:'🍌', item:'🍌', color:'bg-orange', type:'homework', goal:15 },
  { id:'dokusho', name:'どくしょ', icon:'🍓', item:'🍓', color:'bg-green', type:'homework', goal:null },
];
const STAGES = [
  { name:'🥚 たまご', emoji:'🥚', sprite:null, threshold:0, size:64 },
  { name:'🐣 ようしょうき', emoji:'🐣', sprite:SPRITE_STAGE2, threshold:5, size:110 },
  { name:'🐥 せいちょうき', emoji:'🐥', sprite:SPRITE_STAGE3, threshold:15, size:130 },
  { name:'🐔 せいじゅくき', emoji:'🐔', sprite:SPRITE_STAGE4, threshold:30, size:150 },
  { name:'🌟 スーパーハルヤスミン', emoji:'🦄', sprite:SPRITE_STAGE5, threshold:50, size:170 },
];
const EAT_WORDS = ['おいしい！','もぐもぐ','やったー！','ありがとう！','パクパク♪','うれしい！','すごい！','おなかいっぱい！'];

function getToday() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function loadState() { try { const r=localStorage.getItem('haruyasmin'); if(r) return JSON.parse(r); } catch(e){} return null; }
function defaultState() { return { totalFed:0, stageIndex:0, lastDate:getToday(), dailyDone:{}, homeworkDone:{}, floorItems:[], itemIdCounter:0 }; }
let state = loadState() || defaultState();
if (state.lastDate !== getToday()) { state.dailyDone = {}; state.lastDate = getToday(); }
function saveState() { localStorage.setItem('haruyasmin', JSON.stringify(state)); }

let feedQueue=[], isFeeding=false;
function enqueueFeed(el,id) { feedQueue.push({el,itemId:id}); if(!isFeeding) processNextFeed(); }
function processNextFeed() {
  if(!feedQueue.length) { isFeeding=false; document.getElementById('character').style.left='50%'; return; }
  isFeeding=true; const {el,itemId}=feedQueue.shift();
  if(!el.parentNode) { processNextFeed(); return; }
  doFeed(el,itemId);
}
function doFeed(el,itemId) {
  const character=document.getElementById('character'), sprite=document.getElementById('char-sprite'), charBody=character.querySelector('.char-body');
  el.style.pointerEvents='none'; el.classList.remove('bounce-hint');
  character.style.left=parseFloat(el.style.left)+'px'; character.style.transform='translateX(-50%)';
  setTimeout(()=>{
    sprite.classList.remove('idle'); sprite.classList.add('eating');
    showSpeechBubble(charBody);
    el.style.animation='flyToChar 0.4s ease forwards'; setTimeout(()=>el.remove(),400);
    state.floorItems=state.floorItems.filter(i=>i.id!==itemId); state.totalFed++; saveState();
    checkEvolution(); updateStatusBar();
    setTimeout(()=>{ sprite.classList.remove('eating'); sprite.classList.add('idle'); processNextFeed(); },700);
  },400);
}
function showSpeechBubble(parent) {
  const old=parent.querySelector('.speech-bubble'); if(old) old.remove();
  const b=document.createElement('div'); b.className='speech-bubble';
  b.textContent=EAT_WORDS[Math.floor(Math.random()*EAT_WORDS.length)];
  parent.appendChild(b); setTimeout(()=>b.remove(),1200);
}

function renderTasks() {
  const dc=document.getElementById('daily-tasks'), hc=document.getElementById('homework-tasks');
  dc.innerHTML=''; hc.innerHTML='';
  TASKS.forEach(task=>{
    const isDone=task.type==='daily'?(state.dailyDone[task.id]||0)>=1:task.goal&&(state.homeworkDone[task.id]||0)>=task.goal;
    const count=task.type==='daily'?(state.dailyDone[task.id]||0):(state.homeworkDone[task.id]||0);
    const div=document.createElement('div'); div.className='task-item';
    let pt='';
    if(task.type==='homework'&&task.goal) pt=`${count} / ${task.goal} ページ`;
    else if(task.type==='homework') pt=`${count} さつ`;
    else pt=isDone?'きょう ✅':'きょう まだ';
    div.innerHTML=`<span class="task-icon">${task.icon}</span><div class="task-info"><div class="task-name">${task.name}</div><div class="task-progress">${pt}</div></div><button class="task-btn ${task.color} ${isDone&&task.type==='daily'?'done':''}" ${isDone&&task.type==='daily'?'disabled':''}>${isDone&&task.type==='daily'?'できた！':task.type==='homework'&&task.goal?'+1ページ':'やった！'}</button>`;
    if(task.type==='homework'&&task.goal&&count>=task.goal) { const b=div.querySelector('button'); b.classList.add('done'); b.disabled=true; b.textContent='かんりょう！'; }
    const btn=div.querySelector('button'); if(!btn.disabled) btn.addEventListener('click',()=>completeTask(task));
    (task.type==='daily'?dc:hc).appendChild(div);
  });
}

function completeTask(task) {
  if(task.type==='daily') state.dailyDone[task.id]=(state.dailyDone[task.id]||0)+1;
  else state.homeworkDone[task.id]=(state.homeworkDone[task.id]||0)+1;
  dropItem(task.item,true); saveState(); renderTasks();
}
function dropItem(emoji,autoFeed) {
  const room=document.getElementById('room'), rect=room.getBoundingClientRect();
  const floorTop=rect.height-80, landY=floorTop-30+Math.random()*20, x=30+Math.random()*(rect.width-80);
  const id=++state.itemIdCounter; state.floorItems.push({id,item:emoji,x,y:landY}); saveState();
  const el=document.createElement('div'); el.className='dropped-item'; el.textContent=emoji; el.dataset.itemId=id;
  el.style.left=x+'px'; el.style.setProperty('--land-y',landY+'px'); el.style.animation='itemFall 0.8s ease forwards'; el.style.top='-40px';
  el.addEventListener('click',()=>{ el.classList.remove('bounce-hint'); enqueueFeed(el,id); });
  room.appendChild(el);
  setTimeout(()=>{ el.style.animation=''; el.style.top=landY+'px'; if(autoFeed){ setTimeout(()=>{el.classList.add('bounce-hint'); setTimeout(()=>enqueueFeed(el,id),300);},200); } else { el.classList.add('bounce-hint'); } },850);
}

function getCurrentStage() { let idx=0; for(let i=STAGES.length-1;i>=0;i--){if(state.totalFed>=STAGES[i].threshold){idx=i;break;}} return idx; }
function checkEvolution() { const n=getCurrentStage(); if(n>state.stageIndex){state.stageIndex=n;saveState();showEvolution(n);} updateCharacter(); }
function updateCharacter() {
  const s=STAGES[state.stageIndex], sp=document.getElementById('char-sprite');
  if(s.sprite) {
    sp.textContent=''; sp.style.fontSize='0px';
    sp.style.width=s.size+'px'; sp.style.height=s.size+'px';
    sp.style.backgroundImage='url('+s.sprite+')';
    sp.style.backgroundSize='contain'; sp.style.backgroundRepeat='no-repeat'; sp.style.backgroundPosition='center';
  } else {
    sp.textContent=s.emoji; sp.style.fontSize=s.size+'px';
    sp.style.width=''; sp.style.height=''; sp.style.backgroundImage='';
  }
}
function updateStatusBar() {
  const ci=state.stageIndex, s=STAGES[ci], ns=STAGES[ci+1];
  document.getElementById('stage-label').textContent=s.name;
  if(ns) { const p=state.totalFed-s.threshold, n=ns.threshold-s.threshold; document.getElementById('xp-bar').style.width=Math.min(100,(p/n)*100)+'%'; document.getElementById('xp-text').textContent=`${state.totalFed} / ${ns.threshold}`; }
  else { document.getElementById('xp-bar').style.width='100%'; document.getElementById('xp-text').textContent=`${state.totalFed} ✨ MAX`; }
}
function showEvolution(si) {
  const s=STAGES[si]; const sq=[...feedQueue]; feedQueue=[];
  const evoEl=document.getElementById('evo-emoji');
  if(s.sprite) {
    evoEl.textContent=''; evoEl.style.backgroundImage='url('+s.sprite+')';
    evoEl.style.backgroundSize='contain'; evoEl.style.backgroundRepeat='no-repeat'; evoEl.style.backgroundPosition='center';
    evoEl.style.width='160px'; evoEl.style.height='160px'; evoEl.style.margin='0 auto 20px'; evoEl.style.fontSize='0px';
  } else {
    evoEl.textContent=s.emoji; evoEl.style.backgroundImage=''; evoEl.style.width=''; evoEl.style.height=''; evoEl.style.margin=''; evoEl.style.fontSize='120px';
  }
  document.getElementById('evo-title').textContent=si===1?'🎉 たまごがわれた！🎉':si===STAGES.length-1?'🎉 さいしゅうしんか！！🎉':'しんかした！';
  document.getElementById('evo-sub').textContent=`→ ${s.name}`;
  document.getElementById('evo-overlay').classList.add('show');
  spawnConfetti(si===STAGES.length-1?60:si===1?40:25); window._savedQueue=sq;
}
function closeEvolution() {
  document.getElementById('evo-overlay').classList.remove('show');
  document.querySelectorAll('.confetti-piece').forEach(e=>e.remove());
  if(window._savedQueue&&window._savedQueue.length>0){feedQueue=[...window._savedQueue,...feedQueue];window._savedQueue=[];if(!isFeeding)processNextFeed();}
}
function spawnConfetti(count) {
  const em=['🌸','⭐','🎀','💖','🍎','🍊','🍌','🍓','🍙','✨','🎉','🌟'];
  for(let i=0;i<count;i++){const el=document.createElement('div');el.className='confetti-piece';el.textContent=em[Math.floor(Math.random()*em.length)];el.style.left=Math.random()*100+'vw';el.style.top='-40px';el.style.fontSize=(16+Math.random()*20)+'px';document.body.appendChild(el);const d=2000+Math.random()*2000,dl=Math.random()*1500,ex=(Math.random()-0.5)*200;el.animate([{top:'-40px',transform:'translateX(0) rotate(0deg)',opacity:1},{top:'110vh',transform:`translateX(${ex}px) rotate(${360+Math.random()*360}deg)`,opacity:0}],{duration:d,delay:dl,fill:'forwards'});setTimeout(()=>el.remove(),d+dl+100);}
}
function restoreFloorItems() {
  const room=document.getElementById('room');
  state.floorItems.forEach(fi=>{ const el=document.createElement('div');el.className='dropped-item bounce-hint';el.textContent=fi.item;el.dataset.itemId=fi.id;el.style.left=fi.x+'px';el.style.top=fi.y+'px';el.addEventListener('click',()=>enqueueFeed(el,fi.id));room.appendChild(el); });
}
const CAL_START=new Date(2026,2,26),CAL_END=new Date(2026,3,7),CAL_DAYS_TOTAL=13,DOW_NAMES=['日','月','火','水','木','金','土'];
function renderCalendar() {
  const c=document.getElementById('calendar-days');c.innerHTML='';
  const now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  document.getElementById('calendar-today').textContent=`きょう：${today.getMonth()+1}/${today.getDate()}（${DOW_NAMES[today.getDay()]}）`;
  for(let i=0;i<CAL_DAYS_TOTAL;i++){const date=new Date(CAL_START);date.setDate(date.getDate()+i);const dn=date.getDate(),dw=date.getDay(),isPast=date<today,isToday=date.getTime()===today.getTime(),isFuture=date>today;
  const cell=document.createElement('div');let cls='cal-day';if(isPast)cls+=' past';if(isToday)cls+=' today';if(isFuture)cls+=' future';if(dw===0)cls+=' is-sun';if(dw===6)cls+=' is-sat';cell.className=cls;
  let d=`${dn}`;if(i===0)d=`3/${dn}`;if(dn===1)d=`4/${dn}`;
  cell.innerHTML=`<div class="cal-day-num">${d}</div><div class="cal-day-bar"></div><div class="cal-day-dow">${DOW_NAMES[dw]}</div>`;c.appendChild(cell);}
  const r=document.getElementById('cal-remaining'),diff=Math.ceil((CAL_END.getTime()-today.getTime())/(1000*60*60*24));
  if(today<CAL_START){const u=Math.ceil((CAL_START.getTime()-today.getTime())/(1000*60*60*24));r.innerHTML=`はるやすみまで あと <span>${u}にち</span>`;}
  else if(diff>0)r.innerHTML=`のこり <span>${diff}にち</span> がんばろう！`;
  else if(diff===0)r.innerHTML=`<span>きょうが さいごのひ！</span> がんばれ！`;
  else r.innerHTML=`<span>はるやすみ おわり！</span> おつかれさま！`;
}
function init() { renderCalendar(); renderTasks(); updateCharacter(); updateStatusBar(); restoreFloorItems(); }
init();
</script>
